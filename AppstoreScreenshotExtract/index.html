<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #fff;
      --surface2: #f0efe9;
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.14);
      --text: #1a1916;
      --text2: #6b6a66;
      --text3: #a8a79f;
      --accent: #2d5be3;
      --accent-bg: #eef1fd;
      --accent-text: #1e3fa8;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px
    }

    .header {
      padding: 48px 24px 32px;
      max-width: 1080px;
      margin: 0 auto
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px
    }

    .header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -.02em
    }

    .header h1 strong {
      font-weight: 500
    }

    .header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6
    }

    .input-section {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px
    }

    textarea {
      width: 100%;
      min-height: 108px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .15s
    }

    textarea:focus {
      border-color: var(--accent)
    }

    textarea::placeholder {
      color: var(--text3)
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap
    }

    .btn {
      padding: 9px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all .15s
    }

    .btn:hover {
      background: var(--surface2)
    }

    .btn:active {
      transform: scale(.98)
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    .btn.primary {
      background: var(--text);
      color: #fff;
      border-color: transparent
    }

    .btn.primary:hover {
      opacity: .88
    }

    .status-text {
      font-size: 13px;
      color: var(--text3);
      margin-left: 4px
    }

    .progress-wrap {
      max-width: 1080px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text2)
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background .2s
    }

    .dot.active {
      background: var(--accent);
      animation: blink 1s infinite
    }

    .dot.done {
      background: var(--success)
    }

    .dot.fail {
      background: #ef4444
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .25
      }
    }

    .results {
      max-width: 1080px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .2s
    }

    .app-card:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, .06)
    }

    .app-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 20px 14px
    }

    .app-icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      border: 1px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2)
    }

    .app-meta {
      flex: 1;
      min-width: 0
    }

    .app-name {
      font-size: 17px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .app-dev {
      font-size: 12px;
      color: var(--text3);
      margin-top: 5px
    }

    .app-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      font-size: 12px;
      color: var(--text2)
    }

    .stars {
      color: #f59e0b;
      letter-spacing: 1px
    }

    .app-link {
      display: inline-block;
      margin-top: 7px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500
    }

    .app-link:hover {
      text-decoration: underline
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px
    }

    .screenshots-wrap {
      padding: 14px 20px 18px
    }

    .screenshots-label {
      font-size: 10.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text3);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none
    }

    .badge.api {
      background: var(--accent-bg);
      color: var(--accent-text)
    }

    .badge.page {
      background: var(--success-bg);
      color: var(--success)
    }

    .screenshots {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px
    }

    .screenshots::-webkit-scrollbar {
      height: 10px
    }

    .screenshots::-webkit-scrollbar-track {
      background: var(--surface2);
      border-radius: 5px;
    }

    .screenshots::-webkit-scrollbar-thumb {
      background: var(--text3);
      border-radius: 5px;
      border: 2px solid var(--surface);
    }

    .screenshots::-webkit-scrollbar-thumb:hover {
      background: var(--text2);
    }

    .screenshot {
      height: 440px;
      border-radius: 12px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      object-fit: cover;
      cursor: zoom-in;
      transition: opacity .15s, transform .15s
    }

    .screenshot:hover {
      opacity: .9;
      transform: scale(1.02)
    }

    .no-shots {
      font-size: 13px;
      color: var(--text3)
    }

    .skel {
      animation: shimmer 1.5s ease-in-out infinite
    }

    @keyframes shimmer {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .45
      }
    }

    .skel-block {
      background: var(--surface2);
      border-radius: 6px
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out
    }

    .lightbox.open {
      display: flex
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .5)
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 26px;
      color: rgba(255, 255, 255, .8);
      cursor: pointer;
      line-height: 1;
      transition: color .15s
    }

    .lb-close:hover {
      color: #fff
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-eyebrow">Tool</div>
    <h1><strong>App Store</strong><br />Preview</h1>
    <p>Paste up to 10 App Store URLs and instantly see name, subtitle &amp; screenshots side by side.</p>
  </div>

  <div class="input-section">
    <div class="input-card">
      <textarea id="urls" placeholder="https://apps.apple.com/us/app/sticky-note-widget-stickies/id1625584631
https://apps.apple.com/us/app/notion/id1232780281
https://apps.apple.com/us/app/things-3/id904237743"></textarea>
      <div class="controls">
        <button class="btn primary" id="fetchBtn" onclick="window.fetchApps()">Fetch apps</button>
        <button class="btn" onclick="window.clearAll()">Clear</button>
        <span class="status-text" id="statusText"></span>
      </div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap"></div>
  <div class="results" id="results"></div>

  <div class="lightbox" id="lightbox" onclick="window.closeLightbox()">
    <span class="lb-close" onclick="window.closeLightbox()">&#x2715;</span>
    <img id="lbImg" src="" alt="" />
  </div>

  <script>
    (function () {
      var PROXY = function (url) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url); };
      var COUNTRIES = ['us', 'gb', 'au', 'de', 'fr', 'ca', 'jp'];

      function extractId(url) {
        var m = url.match(/\/id(\d+)/i);
        return m ? m[1] : null;
      }

      function starsHtml(r) {
        return Array.from({ length: 5 }, function (_, i) { return i < Math.round(r) ? '★' : '☆'; }).join('');
      }

      /* ── Your proven srcset extractor ── */
      function normalizeUrl(u) {
        if (!u) return '';
        u = u.trim();
        return u.startsWith('//') ? 'https:' + u : u;
      }
      function extractImages(html, isMacApp) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var map = new Map();

        // Scope to the exact relevant platform section so iPhone and Mac screenshots do NOT mix
        var section = null;
        if (isMacApp) {
          section = doc.querySelector('#product_media_mac_');
        } else {
          section = doc.querySelector('#product_media_phone_');
          if (!section) section = doc.querySelector('#product_media_pad_');
        }

        // If a specialized section exists, query inside it. Otherwise fallback to the whole page.
        var selector = 'div[aria-label="Screenshot"] [srcset], .we-screenshot-viewer__screenshot [srcset]';
        var elements = section ? section.querySelectorAll(selector) : doc.querySelectorAll(selector);
        
        // Fallback to all srcset elements if the precise selectors didn't find anything 
        // (to future-proof against App Store DOM structure changes)
        if (elements.length === 0) {
            elements = section ? section.querySelectorAll('[srcset]') : doc.querySelectorAll('[srcset]');
        }

        elements.forEach(function (el) {
          var srcset = el.getAttribute('srcset') || '';
          var best = null;

          srcset.split(',').forEach(function (item) {
            var parts = item.trim().split(/\s+/);
            var url = normalizeUrl(parts[0]);
            var descriptor = parts[1] || '';

            var score = 0;
            if (descriptor.endsWith('w')) score = parseInt(descriptor, 10);
            else if (descriptor.endsWith('x')) score = parseFloat(descriptor) * 1000;

            if (!best || score > best.score) {
              best = { url: url, score: score };
            }
          });

          if (best && best.url) {
            // 1. No less than 500x500 size
            // Exclude if BOTH dimensions are smaller than 500 (ignoring '0' which means auto-scale)
            var dimMatch = best.url.match(/(\d+)x(\d+)/i);
            if (dimMatch) {
              var w = parseInt(dimMatch[1], 10);
              var h = parseInt(dimMatch[2], 10);
              if (w > 0 && h > 0 && w < 500 && h < 500) {
                return; // Skip if BOTH width and height are strictly less than 500
              }
            }

            // 2. No repeated
            // Extract the unique folder ID + filename (e.g., .../8bb78254-b073.../1.jpg/...)
            // This properly deduplicates different resolutions of the EXACT same image, 
            // without merging different screenshots that happen to be named '1.jpg'
            var fileMatch = best.url.match(/\/([^\/]+\/[^\/]+\.(?:jpg|png|jpeg|webp))\//i);
            var key = fileMatch ? fileMatch[1] : best.url;

            if (!map.has(key) || best.score > map.get(key).score) {
              map.set(key, best);
            }
          }
        });

        return Array.from(map.values()).map(function(item) { return item.url; }).slice(0, 15);
      }

      /* ── Step 1: iTunes API via proxy ── */
      async function tryItunes(appId) {
        var baseApp = null;
        for (var i = 0; i < COUNTRIES.length; i++) {
          var cc = COUNTRIES[i];
          try {
            var apiUrl = 'https://itunes.apple.com/lookup?id=' + appId + '&country=' + cc + '&entity=software';
            var r = await fetch(PROXY(apiUrl));
            if (!r.ok) continue;
            var d = await r.json();
            var app = (d.results || []).find(function (x) { return x.wrapperType === 'software' || x.kind === 'software'; });
            if (!app) continue;
            if (!baseApp) baseApp = app;
            if (app.screenshotUrls && app.screenshotUrls.length > 0)
              return { app: app, shots: app.screenshotUrls, source: 'api' };
          } catch (e) { }
        }
        return { app: baseApp, shots: [], source: 'none' };
      }

      /* ── Step 2: scrape App Store page via proxy, apply srcset extractor ── */
      async function fetchShotsViaPage(url, isMacApp) {
        try {
          var r = await fetch(PROXY(url), { signal: AbortSignal.timeout(12000) });
          if (!r.ok) return [];
          var html = await r.text();
          return extractImages(html, isMacApp);
        } catch (e) { return []; }
      }

      function setDot(i, s) { var el = document.getElementById('dot-' + i); if (el) el.className = 'dot ' + s; }
      function setLabel(i, t) { var el = document.getElementById('lbl-' + i); if (el) el.textContent = t; }

      function skeletonCard() {
        var cols = [0, 1, 2].map(function () {
          return '<div class="skel-block" style="width:226px;height:440px;border-radius:12px;flex-shrink:0"></div>';
        }).join('');
        return '<div class="app-card skel">'
          + '<div class="app-top">'
          + '<div class="skel-block" style="width:68px;height:68px;border-radius:16px;flex-shrink:0"></div>'
          + '<div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px">'
          + '<div class="skel-block" style="height:15px;width:48%"></div>'
          + '<div class="skel-block" style="height:13px;width:68%"></div>'
          + '<div class="skel-block" style="height:11px;width:32%"></div>'
          + '</div></div>'
          + '<div style="padding:0 20px 18px;display:flex;gap:8px">' + cols + '</div>'
          + '</div>';
      }

      function renderCard(app, shots, source, originalUrl) {
        var icon = app.artworkUrl512 || app.artworkUrl100 || app.artworkUrl60 || '';
        var rating = app.averageUserRating;
        var ratingCount = app.userRatingCount;
        var badge = source === 'api'
          ? '<span class="badge api">iTunes API</span>'
          : source === 'page'
            ? '<span class="badge page">App Store page</span>'
            : '';
        var shotsHtml = shots.length
          ? '<div class="screenshots">' + shots.map(function (u) {
            return '<img class="screenshot" src="' + u + '" loading="lazy"'
              + ' onerror="this.style.display=\'none\'"'
              + ' onclick="window.openLightbox(\'' + u + '\')" />';
          }).join('') + '</div>'
          : '<div class="no-shots">No screenshots could be retrieved for this app.</div>';

        var isMacApp = app.kind === 'mac-software' || 
          (app.trackViewUrl && app.trackViewUrl.indexOf('mt=12') !== -1) ||
          (originalUrl && originalUrl.indexOf('mt=12') !== -1);
        var storeName = isMacApp ? 'Mac App Store' : 'App Store';
        var linkUrl = originalUrl || app.trackViewUrl;

        return '<div class="app-card">'
          + '<div class="app-top">'
          + (icon ? '<img class="app-icon" src="' + icon + '" alt="" loading="lazy"/>' : '<div class="app-icon"></div>')
          + '<div class="app-meta">'
          + '<div class="app-name">' + (app.trackName || 'Unknown') + '</div>'
          + (app.subtitle ? '<div class="app-subtitle">' + app.subtitle + '</div>' : '')
          + (app.artistName ? '<div class="app-dev">by ' + app.artistName + '</div>' : '')
          + (rating ? '<div class="app-rating"><span class="stars">' + starsHtml(rating) + '</span>'
            + rating.toFixed(1) + (ratingCount ? ' &middot; ' + ratingCount.toLocaleString() + ' ratings' : '') + '</div>' : '')
          + (linkUrl ? '<a class="app-link" href="' + linkUrl + '" target="_blank" rel="noopener">View on ' + storeName + ' ↗</a>' : '')
          + '</div></div>'
          + '<div class="card-divider"></div>'
          + '<div class="screenshots-wrap">'
          + '<div class="screenshots-label">Screenshots ' + badge + '</div>'
          + shotsHtml
          + '</div></div>';
      }

      async function processApp(url, idx) {
        var appId = extractId(url);
        setLabel(idx, 'Fetching metadata...');
        var result = await tryItunes(appId);
        var app = result.app;
        var apiShots = result.shots || [];

        var isMacApp = (app && app.kind === 'mac-software') || 
                       (app && app.trackViewUrl && app.trackViewUrl.indexOf('mt=12') !== -1) ||
                       (url.indexOf('mt=12') !== -1);

        if (!app) { setDot(idx, 'fail'); setLabel(idx, 'App not found'); return null; }

        setLabel(idx, app.trackName + ' — scraping App Store page...');
        var pageShots = await fetchShotsViaPage(url, isMacApp);

        if (pageShots.length > 0) {
          setDot(idx, 'done');
          setLabel(idx, app.trackName + ' — ' + pageShots.length + ' screenshots');
          return renderCard(app, pageShots, 'page', url);
        }

        if (apiShots.length > 0) {
          setDot(idx, 'done');
          setLabel(idx, app.trackName + ' — ' + apiShots.length + ' screenshots');
          return renderCard(app, apiShots, 'api', url);
        }

        setDot(idx, 'fail');
        setLabel(idx, app.trackName + ' — no screenshots found');
        return renderCard(app, [], 'none', url);
      }

      /* ── Globals for onclick handlers ── */
      window.fetchApps = async function () {
        var raw = document.getElementById('urls').value.trim();
        var results = document.getElementById('results');
        var progressWrap = document.getElementById('progressWrap');
        var btn = document.getElementById('fetchBtn');
        var statusText = document.getElementById('statusText');

        var lines = raw.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
        if (!lines.length) return;
        if (lines.length > 10) { alert('Max 10 URLs at a time.'); return; }

        var ids = lines.map(extractId);
        if (ids.some(function (id) { return !id; })) {
          alert('One or more URLs are not valid App Store links.');
          return;
        }

        btn.disabled = true;
        statusText.textContent = '';
        results.innerHTML = ids.map(function () { return skeletonCard(); }).join('');
        progressWrap.innerHTML = ids.map(function (_, i) {
          return '<div class="progress-item"><div class="dot active" id="dot-' + i + '"></div><span id="lbl-' + i + '">Waiting...</span></div>';
        }).join('');

        var cards = await Promise.all(lines.map(function (url, i) { return processApp(url, i); }));
        var valid = cards.filter(Boolean);
        results.innerHTML = valid.join('');
        statusText.textContent = 'Loaded ' + valid.length + ' app' + (valid.length !== 1 ? 's' : '');
        btn.disabled = false;
      };

      window.clearAll = function () {
        document.getElementById('urls').value = '';
        document.getElementById('results').innerHTML = '';
        document.getElementById('progressWrap').innerHTML = '';
        document.getElementById('statusText').textContent = '';
      };

      window.openLightbox = function (src) {
        document.getElementById('lbImg').src = src;
        document.getElementById('lightbox').classList.add('open');
      };

      window.closeLightbox = function () {
        document.getElementById('lightbox').classList.remove('open');
      };

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') window.closeLightbox();
      });

    })();
  </script>
</body>

</html>
