<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Preview</title>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #fff;
      --surface2: #f0efe9;
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.14);
      --text: #1a1916;
      --text2: #6b6a66;
      --text3: #a8a79f;
      --accent: #2d5be3;
      --accent-bg: #eef1fd;
      --accent-text: #1e3fa8;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body.dark {
      --bg: #141414;
      --surface: #1e1e1e;
      --surface2: #272727;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.15);
      --text: #f0ede8;
      --text2: #a09e99;
      --text3: #5c5a56;
      --accent: #5b8af5;
      --accent-bg: #1a2340;
      --accent-text: #93b4ff;
      --success: #34d06a;
      --success-bg: #0d2a1a;
    }

    body {
      transition: background .25s, color .25s;
    }

    .theme-toggle {
      position: fixed;
      top: 14px;
      left: 18px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: background .2s, border-color .2s, transform .15s;
      line-height: 1;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      background: var(--surface2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px
    }

    .header {
      padding: 72px clamp(16px, 3vw, 48px) 32px;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px
    }

    .header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -.02em
    }

    .header h1 strong {
      font-weight: 500
    }

    .header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6
    }

    .input-section {
      padding: 0 clamp(16px, 3vw, 48px);
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px
    }

    textarea {
      width: 100%;
      min-height: 108px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .15s
    }

    textarea:focus {
      border-color: var(--accent)
    }

    textarea::placeholder {
      color: var(--text3)
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap
    }

    .btn {
      padding: 9px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all .15s
    }

    .btn:hover {
      background: var(--surface2)
    }

    .btn:active {
      transform: scale(.98)
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    .btn.primary {
      background: #2d5be3;
      color: #fff;
      border-color: transparent
    }

    body.dark .btn.primary {
      background: #5b8af5;
      color: #0d1117
    }

    .btn.primary:hover {
      opacity: .88
    }

    .status-text {
      font-size: 13px;
      color: var(--text3);
      margin-left: 4px
    }

    .progress-wrap {
      margin: 16px 0 0;
      padding: 0 clamp(16px, 3vw, 48px);
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text2)
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background .2s
    }

    .dot.active {
      background: var(--accent);
      animation: blink 1s infinite
    }

    .dot.done {
      background: var(--success)
    }

    .dot.fail {
      background: #ef4444
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .25
      }
    }

    .results {
      margin: 24px 0 0;
      padding: 0 clamp(16px, 3vw, 48px);
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .2s
    }

    .app-card:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, .06)
    }

    .app-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 20px 14px
    }

    .app-icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      border: 1px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2)
    }

    .app-meta {
      flex: 1;
      min-width: 0
    }

    .app-name {
      font-size: 17px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .app-dev {
      font-size: 12px;
      color: var(--text3);
      margin-top: 5px
    }

    .app-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      font-size: 12px;
      color: var(--text2)
    }

    .stars {
      color: #f59e0b;
      letter-spacing: 1px
    }

    .app-link {
      display: inline-block;
      margin-top: 7px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500
    }

    .app-link:hover {
      text-decoration: underline
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px
    }

    .screenshots-wrap {
      padding: 14px 20px 18px
    }

    .screenshots-label {
      font-size: 10.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text3);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none
    }

    .badge.api {
      background: var(--accent-bg);
      color: var(--accent-text)
    }

    .badge.page {
      background: var(--success-bg);
      color: var(--success)
    }

    .screenshots {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px
    }

    .screenshots::-webkit-scrollbar {
      height: 10px
    }

    .screenshots::-webkit-scrollbar-track {
      background: var(--surface2);
      border-radius: 5px;
    }

    .screenshots::-webkit-scrollbar-thumb {
      background: var(--text3);
      border-radius: 5px;
      border: 2px solid var(--surface);
    }

    .screenshots::-webkit-scrollbar-thumb:hover {
      background: var(--text2);
    }

    .screenshot {
      height: clamp(200px, 38vh, 520px);
      border-radius: 12px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      object-fit: cover;
      cursor: zoom-in;
      transition: opacity .15s, transform .15s
    }

    @media (max-width: 600px) {
      .app-top {
        flex-wrap: wrap;
        gap: 10px
      }

      .app-icon {
        width: 52px;
        height: 52px
      }

      .app-name {
        font-size: 15px
      }

      .header h1 {
        font-size: clamp(22px, 6vw, 32px)
      }

      .btn {
        padding: 8px 14px;
        font-size: 13px
      }
    }

    .screenshot:hover {
      opacity: .9;
      transform: scale(1.02)
    }

    .no-shots {
      font-size: 13px;
      color: var(--text3)
    }

    .skel {
      animation: shimmer 1.5s ease-in-out infinite
    }

    @keyframes shimmer {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .45
      }
    }

    .skel-block {
      background: var(--surface2);
      border-radius: 6px
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out
    }

    .lightbox.open {
      display: flex
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .5)
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 26px;
      color: rgba(255, 255, 255, .8);
      cursor: pointer;
      line-height: 1;
      transition: color .15s
    }

    .lb-close:hover {
      color: #fff
    }

    .branch-badge {
      position: fixed;
      top: 14px;
      right: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 5px 12px 5px 9px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      user-select: none;
    }

    .branch-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #16a34a;
      flex-shrink: 0;
      animation: branch-pulse 2.5s ease-in-out infinite;
    }

    @keyframes branch-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
    
    .auth-info {
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 16px;
      border-radius: 10px;
      margin-top: 16px;
      display: inline-flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: #fff;
    }

    body.dark .auth-info {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .user-email {
      font-size: 13.5px;
      opacity: 0.9;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13.5px;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(20, 20, 20, 0.96);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      color: #f0ede8;
      font-size: 1.1rem;
      font-family: 'DM Sans', sans-serif;
      gap: 16px;
    }

    .auth-spinner {
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid #5b8af5;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 0.9s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media print {
      /* Hide all UI chrome */
      .header, .input-section, .progress-wrap,
      .branch-badge, .theme-toggle, .lightbox,
      .app-link, .screenshots-label { display: none !important; }

      /* Reset page */
      body {
        background: #fff !important;
        color: #111 !important;
        padding: 0 !important;
        font-family: 'DM Sans', sans-serif;
      }

      .results {
        margin: 0 !important;
        padding: 16px !important;
        gap: 24px !important;
      }

      .app-card {
        border: 1px solid #ddd !important;
        border-radius: 10px !important;
        page-break-inside: avoid;
        break-inside: avoid;
        overflow: visible !important;
        background: #fff !important;
      }

      .app-top {
        padding: 12px 14px 8px !important;
      }

      .app-icon {
        width: 48px !important;
        height: 48px !important;
      }

      .app-name {
        font-size: 14px !important;
        color: #111 !important;
      }

      .app-subtitle, .app-dev, .app-rating {
        color: #555 !important;
      }

      .card-divider {
        background: #eee !important;
      }

      .screenshots-wrap {
        padding: 10px 14px 14px !important;
      }

      .screenshots {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 8px !important;
        overflow: visible !important;
        padding: 0 !important;
      }

      .screenshot {
        height: 180px !important;
        width: auto !important;
        border-radius: 6px !important;
        border: 1px solid #ddd !important;
        flex-shrink: 0 !important;
      }
    }
  </style>
</head>

<body>

  <!-- Auth loading screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="auth-spinner"></div>
    <div>Checking authentication...</div>
  </div>

  <div id="mainContent" style="display: none;">

  <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>

  <div class="branch-badge">
    <span class="branch-dot"></span>
    AppStoreScreenshotExplorer
  </div>

  <div class="header">
    <div class="header-eyebrow">Tool</div>
    <h1><strong>App Store</strong> Preview</h1>
    <p>Paste up to 15 App Store URLs and instantly see name, subtitle &amp; screenshots side by side.</p>
    <div id="userInfo"></div>
  </div>

  <div class="input-section">
    <div class="input-card">
      <textarea id="urls" placeholder="https://apps.apple.com/us/app/sticky-note-widget-stickies/id1625584631
https://apps.apple.com/us/app/notion/id1232780281
https://apps.apple.com/us/app/things-3/id904237743"></textarea>
      <div class="controls">
        <button class="btn primary" id="fetchBtn" onclick="window.fetchApps()">Fetch apps</button>
        <button class="btn" onclick="window.clearAll()">Clear</button>
        <button class="btn" id="downloadBtn" onclick="window.downloadPDF()" style="display:none">⬇ Download PDF</button>
        <span class="status-text" id="statusText"></span>
      </div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap"></div>
  <div class="results" id="results"></div>

  <div class="lightbox" id="lightbox" onclick="window.closeLightbox()">
    <span class="lb-close" onclick="window.closeLightbox()">&#x2715;</span>
    <img id="lbImg" src="" alt="" />
  </div>

  <script>
    (function () {
      var PROXY = function (url) { return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url); };
      var COUNTRIES = ['us', 'gb', 'au', 'de', 'fr', 'ca', 'jp'];

      function extractId(url) {
        var m = url.match(/\/id(\d+)/i);
        return m ? m[1] : null;
      }

      function starsHtml(r) {
        return Array.from({ length: 5 }, function (_, i) { return i < Math.round(r) ? '★' : '☆'; }).join('');
      }

      /* ── Build a full-resolution URL from an mzstatic template ── */
      function buildUrl(item) {
        var ss = item.screenshot;
        if (!ss || !ss.template) return null;
        var w = ss.width || 2000;
        var h = ss.height || 2000;
        var crop = ss.crop || 'bb';
        // Use PNG for best quality
        return ss.template
          .replace('{w}', w)
          .replace('{h}', h)
          .replace('{c}', crop)
          .replace('{f}', 'png');
      }

      /* ── Walk the serialized-server-data JSON and collect screenshot shelves ──
         Each shelf is a list of ProductMediaItem objects. We identify platform
         by the filename keyword in the first item's template URL:
           catalyst  → Mac
           iPadPro   → iPad
           iPhone    → iPhone
      ── */
      function collectShelves(obj, shelves) {
        if (!obj || typeof obj !== 'object') return;
        if (Array.isArray(obj)) {
          obj.forEach(function(v) { collectShelves(v, shelves); });
          return;
        }
        if (obj.$kind === 'Shelf' && Array.isArray(obj.items)) {
          var media = obj.items.filter(function(it) { return it && it.$kind === 'ProductMediaItem'; });
          if (media.length > 0) shelves.push(media);
        }
        Object.values(obj).forEach(function(v) { collectShelves(v, shelves); });
      }

      function extractFromSerializedData(html, platform) {
        // platform: 'mac' | 'ipad' | 'iphone'
        var match = html.match(/<script[^>]+id="serialized-server-data"[^>]*>([\s\S]*?)<\/script>/);
        if (!match) return [];
        var data;
        try { data = JSON.parse(match[1]); } catch(e) { return []; }

        var shelves = [];
        collectShelves(data, shelves);

        // Identify which shelf is Mac vs iPad vs iPhone by the first item's template
        var PLATFORM_KEYWORDS = { mac: 'catalyst', ipad: 'ipadpro', iphone: 'iphone' };
        var keyword = PLATFORM_KEYWORDS[platform] || 'catalyst';

        var macShelf = null;
        for (var i = 0; i < shelves.length; i++) {
          var first = shelves[i][0];
          var tmpl = (first && first.screenshot && first.screenshot.template) ? first.screenshot.template.toLowerCase() : '';
          if (tmpl.indexOf(keyword) !== -1) {
            macShelf = shelves[i];
            break;
          }
        }

        // Fall back: return all ProductMediaItems from all shelves
        var targetItems = macShelf || shelves.reduce(function(a, b) { return a.concat(b); }, []);
        return targetItems.map(buildUrl).filter(Boolean);
      }

      /* ── Step 1: iTunes API via proxy ── */
      async function tryItunes(appId) {
        var baseApp = null;
        for (var i = 0; i < COUNTRIES.length; i++) {
          var cc = COUNTRIES[i];
          try {
            var apiUrl = 'https://itunes.apple.com/lookup?id=' + appId + '&country=' + cc + '&entity=software';
            var r = await fetch(PROXY(apiUrl));
            if (!r.ok) continue;
            var d = await r.json();
            var app = (d.results || []).find(function (x) { return x.wrapperType === 'software' || x.kind === 'software'; });
            if (!app) continue;
            if (!baseApp) baseApp = app;
            if (app.screenshotUrls && app.screenshotUrls.length > 0)
              return { app: app, shots: app.screenshotUrls, source: 'api' };
          } catch (e) { }
        }
        return { app: baseApp, shots: [], source: 'none' };
      }

      /* ── Step 2: fetch App Store page and extract via serialized-server-data ── */
      async function fetchShotsViaPage(url, platform) {
        try {
          var r = await fetch(PROXY(url), { signal: AbortSignal.timeout(15000) });
          if (!r.ok) return [];
          var html = await r.text();
          return extractFromSerializedData(html, platform);
        } catch (e) { return []; }
      }

      function setDot(i, s) { var el = document.getElementById('dot-' + i); if (el) el.className = 'dot ' + s; }
      function setLabel(i, t) { var el = document.getElementById('lbl-' + i); if (el) el.textContent = t; }

      function skeletonCard() {
        var cols = [0, 1, 2].map(function () {
          return '<div class="skel-block" style="width:226px;height:440px;border-radius:12px;flex-shrink:0"></div>';
        }).join('');
        return '<div class="app-card skel">'
          + '<div class="app-top">'
          + '<div class="skel-block" style="width:68px;height:68px;border-radius:16px;flex-shrink:0"></div>'
          + '<div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px">'
          + '<div class="skel-block" style="height:15px;width:48%"></div>'
          + '<div class="skel-block" style="height:13px;width:68%"></div>'
          + '<div class="skel-block" style="height:11px;width:32%"></div>'
          + '</div></div>'
          + '<div style="padding:0 20px 18px;display:flex;gap:8px">' + cols + '</div>'
          + '</div>';
      }

      function renderCard(app, shots, source, originalUrl) {
        var icon = app.artworkUrl512 || app.artworkUrl100 || app.artworkUrl60 || '';
        var rating = app.averageUserRating;
        var ratingCount = app.userRatingCount;
        var badge = source === 'api'
          ? '<span class="badge api">iTunes API</span>'
          : source === 'page'
            ? '<span class="badge page">App Store page</span>'
            : '';
        var shotsHtml = shots.length
          ? '<div class="screenshots">' + shots.map(function (u) {
            return '<img class="screenshot" src="' + u + '" loading="lazy"'
              + ' onerror="this.style.display=\'none\'"'
              + ' onclick="window.openLightbox(\'' + u + '\')" />';
          }).join('') + '</div>'
          : '<div class="no-shots">No screenshots could be retrieved for this app.</div>';

        var isMacApp = app.kind === 'mac-software' || 
          (app.trackViewUrl && app.trackViewUrl.indexOf('mt=12') !== -1) ||
          (originalUrl && originalUrl.indexOf('mt=12') !== -1);
        var storeName = isMacApp ? 'Mac App Store' : 'App Store';
        var linkUrl = originalUrl || app.trackViewUrl;

        return '<div class="app-card">'
          + '<div class="app-top">'
          + (icon ? '<img class="app-icon" src="' + icon + '" alt="" loading="lazy"/>' : '<div class="app-icon"></div>')
          + '<div class="app-meta">'
          + '<div class="app-name">' + (app.trackName || 'Unknown') + '</div>'
          + (app.subtitle ? '<div class="app-subtitle">' + app.subtitle + '</div>' : '')
          + (app.artistName ? '<div class="app-dev">by ' + app.artistName + '</div>' : '')
          + (rating ? '<div class="app-rating"><span class="stars">' + starsHtml(rating) + '</span>'
            + rating.toFixed(1) + (ratingCount ? ' &middot; ' + ratingCount.toLocaleString() + ' ratings' : '') + '</div>' : '')
          + (linkUrl ? '<a class="app-link" href="' + linkUrl + '" target="_blank" rel="noopener">View on ' + storeName + ' ↗</a>' : '')
          + '</div></div>'
          + '<div class="card-divider"></div>'
          + '<div class="screenshots-wrap">'
          + '<div class="screenshots-label">Screenshots ' + badge + '</div>'
          + shotsHtml
          + '</div></div>';
      }

      async function processApp(url, idx) {
        var appId = extractId(url);
        setLabel(idx, 'Fetching metadata...');
        var result = await tryItunes(appId);
        var app = result.app;

        var isMacApp = (app && app.kind === 'mac-software') || 
                       (app && app.trackViewUrl && app.trackViewUrl.indexOf('mt=12') !== -1) ||
                       (url.indexOf('mt=12') !== -1) || (url.indexOf('platform=mac') !== -1);
        var isIpadApp = url.indexOf('platform=ipad') !== -1;
        var platform = isMacApp ? 'mac' : (isIpadApp ? 'ipad' : 'iphone');

        if (!app) { setDot(idx, 'fail'); setLabel(idx, 'App not found'); return null; }

        setLabel(idx, app.trackName + ' — reading App Store page...');
        // Primary source: serialized-server-data JSON embedded in the page
        // This contains ALL screenshots at native resolution, bypassing lazy-loading
        var pageShots = await fetchShotsViaPage(url, platform);

        // Fallback: iTunes API screenshots (lower res but reliable)
        var apiShots = [];
        if (app) {
          if (isMacApp && app.macScreenshotUrls && app.macScreenshotUrls.length > 0) {
            apiShots = app.macScreenshotUrls;
          } else if (isIpadApp && app.ipadScreenshotUrls && app.ipadScreenshotUrls.length > 0) {
            apiShots = app.ipadScreenshotUrls;
          } else if (app.screenshotUrls && app.screenshotUrls.length > 0) {
            apiShots = app.screenshotUrls;
          }
        }

        // Prefer page shots (native res from JSON) over API shots
        var finalShots = pageShots.length > 0 ? pageShots : apiShots;
        var source = pageShots.length > 0 ? 'page' : (apiShots.length > 0 ? 'api' : 'none');

        if (finalShots.length > 0) {
          setDot(idx, 'done');
          setLabel(idx, app.trackName + ' — ' + finalShots.length + ' screenshots');
          return renderCard(app, finalShots, source, url);
        }

        setDot(idx, 'fail');
        setLabel(idx, app.trackName + ' — no screenshots found');
        return renderCard(app, [], 'none', url);
      }

      /* ── Globals for onclick handlers ── */
      window.fetchApps = async function () {
        var raw = document.getElementById('urls').value.trim();
        var results = document.getElementById('results');
        var progressWrap = document.getElementById('progressWrap');
        var btn = document.getElementById('fetchBtn');
        var statusText = document.getElementById('statusText');

        var lines = raw.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
        if (!lines.length) return;
        if (lines.length > 15) { alert('Max 15 URLs at a time.'); return; }

        var ids = lines.map(extractId);
        if (ids.some(function (id) { return !id; })) {
          alert('One or more URLs are not valid App Store links.');
          return;
        }

        btn.disabled = true;
        statusText.textContent = '';
        results.innerHTML = ids.map(function () { return skeletonCard(); }).join('');
        progressWrap.innerHTML = ids.map(function (_, i) {
          return '<div class="progress-item"><div class="dot active" id="dot-' + i + '"></div><span id="lbl-' + i + '">Waiting...</span></div>';
        }).join('');

        var cards = await Promise.all(lines.map(function (url, i) { return processApp(url, i); }));
        var valid = cards.filter(Boolean);
        results.innerHTML = valid.join('');
        statusText.textContent = 'Loaded ' + valid.length + ' app' + (valid.length !== 1 ? 's' : '');
        document.getElementById('downloadBtn').style.display = valid.length > 0 ? '' : 'none';
        btn.disabled = false;
      };

      window.clearAll = function () {
        document.getElementById('urls').value = '';
        document.getElementById('results').innerHTML = '';
        document.getElementById('progressWrap').innerHTML = '';
        document.getElementById('statusText').textContent = '';
        document.getElementById('downloadBtn').style.display = 'none';
      };

      window.downloadPDF = function () {
        window.print();
      };

      window.openLightbox = function (src) {
        document.getElementById('lbImg').src = src;
        document.getElementById('lightbox').classList.add('open');
      };

      window.closeLightbox = function () {
        document.getElementById('lightbox').classList.remove('open');
      };

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') window.closeLightbox();
      });

      /* ── Dark mode toggle ── */
      (function () {
        var btn = document.getElementById('themeToggle');
        var dark = localStorage.getItem('darkMode') === '1';
        function apply() {
          document.body.classList.toggle('dark', dark);
          btn.textContent = dark ? '☀️' : '🌙';
        }
        apply();
        btn.addEventListener('click', function () {
          dark = !dark;
          localStorage.setItem('darkMode', dark ? '1' : '0');
          apply();
        });
      })();

    })();
  </script>

                    <button class="logout-btn" onclick="logout()">Logout</button>
