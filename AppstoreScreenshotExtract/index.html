<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.14);
      --text: #1a1916;
      --text2: #6b6a66;
      --text3: #a8a79f;
      --accent: #2d5be3;
      --accent-bg: #eef1fd;
      --accent-text: #1e3fa8;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --warn-bg: #fefce8;
      --warn-text: #854d0e;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    .header {
      padding: 48px 24px 32px;
      max-width: 720px;
      margin: 0 auto;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 300;
      line-height: 1.15;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header h1 strong {
      font-weight: 500;
    }

    .header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6;
    }

    /* ── Input area ── */
    .input-section {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    textarea {
      width: 100%;
      min-height: 108px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--text3);
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 9px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      background: var(--surface2);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn.primary {
      background: var(--text);
      color: #fff;
      border-color: transparent;
    }

    .btn.primary:hover {
      opacity: 0.88;
      background: var(--text);
    }

    .status-text {
      font-size: 13px;
      color: var(--text3);
      margin-left: 4px;
    }

    /* ── Progress ── */
    .progress-wrap {
      max-width: 720px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .progress-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text2);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .dot.active {
      background: var(--accent);
      animation: blink 1s infinite;
    }

    .dot.done {
      background: var(--success);
    }

    .dot.fail {
      background: #ef4444;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.25
      }
    }

    /* ── Results ── */
    .results {
      max-width: 720px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── App Card ── */
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .app-card:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .app-top {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 20px 14px;
    }

    .app-icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      border: 1px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .app-meta {
      flex: 1;
      min-width: 0;
    }

    .app-name {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-dev {
      font-size: 12px;
      color: var(--text3);
      margin-top: 5px;
    }

    .app-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      font-size: 12px;
      color: var(--text2);
    }

    .stars {
      color: #f59e0b;
      letter-spacing: 1px;
    }

    .app-link {
      display: inline-block;
      margin-top: 7px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .app-link:hover {
      text-decoration: underline;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px;
    }

    .screenshots-wrap {
      padding: 14px 20px 18px;
    }

    .screenshots-label {
      font-size: 10.5px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    .badge.api {
      background: var(--accent-bg);
      color: var(--accent-text);
    }

    .badge.ai {
      background: var(--success-bg);
      color: var(--success);
    }

    .badge.warn {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .screenshots {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .screenshots::-webkit-scrollbar {
      height: 3px;
    }

    .screenshots::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .screenshot {
      height: 168px;
      border-radius: 10px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      object-fit: cover;
      cursor: zoom-in;
      transition: opacity 0.15s, transform 0.15s;
    }

    .screenshot:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .no-shots {
      font-size: 13px;
      color: var(--text3);
    }

    /* ── Skeleton ── */
    .skel {
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.45
      }
    }

    .skel-block {
      background: var(--surface2);
      border-radius: 6px;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 90vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 26px;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }

    .lb-close:hover {
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-eyebrow">Tool</div>
    <h1><strong>App Store</strong><br />Preview</h1>
    <p>Paste up to 10 App Store URLs and instantly see name, subtitle &amp; screenshots side by side.</p>
  </div>

  <div class="input-section">
    <div class="input-card">
      <textarea id="urls" placeholder="https://apps.apple.com/us/app/sticky-note-widget-stickies/id1625584631
https://apps.apple.com/us/app/notion/id1232780281
https://apps.apple.com/us/app/things-3/id904237743"></textarea>
      <div class="controls">
        <button class="btn primary" id="fetchBtn" onclick="fetchApps()">Fetch apps</button>
        <button class="btn" onclick="clearAll()">Clear</button>
        <span class="status-text" id="statusText"></span>
      </div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap"></div>
  <div class="results" id="results"></div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lb-close" onclick="closeLightbox()">&#x2715;</span>
    <img id="lbImg" src="" alt="" />
  </div>

  <script>
    // ── CORS proxy: routes all fetches through a proxy that adds CORS headers ──
    const PROXY = url => `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const COUNTRIES = ['us', 'gb', 'au', 'de', 'fr', 'ca', 'jp'];

    function extractId(url) {
      const m = url.match(/\/id(\d+)/i);
      return m ? m[1] : null;
    }
    function starsHtml(r) {
      return Array.from({ length: 5 }, (_, i) => i < Math.round(r) ? '★' : '☆').join('');
    }

    // ── Your proven srcset extractor ────────────────────────────────────────────
    function normalizeUrl(u) {
      if (!u) return '';
      u = u.trim();
      return u.startsWith('//') ? 'https:' + u : u;
    }
    function isClean1024(u) {
      if (!u.endsWith('/1024x1024bb.webp')) return false;
      const m = u.match(/\d+x\d+bb/g);
      return m && m.length === 1;
    }
    function extractUniqueClean1024(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const map = new Map();
      doc.querySelectorAll('[srcset]').forEach(el => {
        const srcset = el.getAttribute('srcset') || '';
        srcset.split(',').forEach(item => {
          const parts = item.trim().split(/\s+/);
          const url = normalizeUrl(parts[0]);
          if (!url || !isClean1024(url)) return;
          const m = url.match(/(.+\.jpg)/);
          const key = m ? m[1] : url;
          if (!map.has(key)) map.set(key, url);
        });
      });
      return Array.from(map.values());
    }
    // ────────────────────────────────────────────────────────────────────────────

    // Step 1: iTunes API via CORS proxy
    async function tryItunes(appId) {
      let baseApp = null;
      for (const cc of COUNTRIES) {
        try {
          const url = `https://itunes.apple.com/lookup?id=${appId}&country=${cc}&entity=software`;
          const r = await fetch(PROXY(url));
          if (!r.ok) continue;
          const d = await r.json();
          const app = (d.results || []).find(x => x.wrapperType === 'software' || x.kind === 'software');
          if (!app) continue;
          if (!baseApp) baseApp = app;
          if (app.screenshotUrls && app.screenshotUrls.length > 0)
            return { app, shots: app.screenshotUrls, source: 'api' };
        } catch (e) { }
      }
      return { app: baseApp, shots: [], source: 'none' };
    }

    // Step 2: Fetch App Store page via CORS proxy, apply your srcset extractor
    async function fetchShotsViaPage(appId) {
      const pageUrl = `https://apps.apple.com/us/app/id${appId}`;
      try {
        const r = await fetch(PROXY(pageUrl), { signal: AbortSignal.timeout(12000) });
        if (!r.ok) return [];
        const html = await r.text();
        return extractUniqueClean1024(html);
      } catch (e) { return []; }
    }

    // ── UI helpers ──────────────────────────────────────────────────────────────
    function setDot(i, s) { const el = document.getElementById('dot-' + i); if (el) el.className = 'dot ' + s; }
    function setLabel(i, t) { const el = document.getElementById('lbl-' + i); if (el) el.textContent = t; }

    function skeletonCard() {
      return `<div class="app-card skel">
    <div class="app-top">
      <div class="skel-block" style="width:68px;height:68px;border-radius:16px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-top:4px">
        <div class="skel-block" style="height:15px;width:48%"></div>
        <div class="skel-block" style="height:13px;width:68%"></div>
        <div class="skel-block" style="height:11px;width:32%"></div>
      </div>
    </div>
    <div style="padding:0 20px 18px;display:flex;gap:8px">
      ${[0, 1, 2].map(() => `<div class="skel-block" style="width:86px;height:168px;border-radius:10px;flex-shrink:0"></div>`).join('')}
    </div>
  </div>`;
    }

    function renderCard(app, shots, source) {
      const icon = app.artworkUrl512 || app.artworkUrl100 || app.artworkUrl60 || '';
      const rating = app.averageUserRating;
      const ratingCount = app.userRatingCount;
      const badge = source === 'api'
        ? `<span class="badge api">iTunes API</span>`
        : source === 'page'
          ? `<span class="badge ai">App Store page</span>`
          : '';

      return `<div class="app-card">
    <div class="app-top">
      ${icon ? `<img class="app-icon" src="${icon}" alt="" loading="lazy"/>` : `<div class="app-icon"></div>`}
      <div class="app-meta">
        <div class="app-name">${app.trackName || 'Unknown'}</div>
        ${app.subtitle ? `<div class="app-subtitle">${app.subtitle}</div>` : ''}
        ${app.artistName ? `<div class="app-dev">by ${app.artistName}</div>` : ''}
        ${rating ? `<div class="app-rating"><span class="stars">${starsHtml(rating)}</span>${rating.toFixed(1)}${ratingCount ? ` &middot; ${ratingCount.toLocaleString()} ratings` : ''}</div>` : ''}
        ${app.trackViewUrl ? `<a class="app-link" href="${app.trackViewUrl}" target="_blank" rel="noopener">View on App Store ↗</a>` : ''}
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="screenshots-wrap">
      <div class="screenshots-label">Screenshots ${badge}</div>
      ${shots.length
          ? `<div class="screenshots">${shots.map(u => `<img class="screenshot" src="${u}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${u}')"/>`).join('')}</div>`
          : `<div class="no-shots">No screenshots could be retrieved for this app.</div>`}
    </div>
  </div>`;
    }

    // ── Main fetch ───────────────────────────────────────────────────────────────
    async function processApp(appId, idx) {
      setLabel(idx, 'Fetching metadata...');

      const { app, shots: apiShots, source } = await tryItunes(appId);
      if (!app) { setDot(idx, 'fail'); setLabel(idx, 'App not found'); return null; }

      if (apiShots.length > 0) {
        setDot(idx, 'done');
        setLabel(idx, `${app.trackName} — ${apiShots.length} screenshots (API)`);
        return renderCard(app, apiShots, 'api');
      }

      setLabel(idx, `${app.trackName} — scraping App Store page...`);
      const pageShots = await fetchShotsViaPage(appId);

      setDot(idx, pageShots.length > 0 ? 'done' : 'fail');
      setLabel(idx, `${app.trackName} — ${pageShots.length > 0 ? pageShots.length + ' screenshots (page)' : 'no screenshots found'}`);
      return renderCard(app, pageShots, pageShots.length > 0 ? 'page' : 'none');
    }

    async function fetchApps() {
      const raw = document.getElementById('urls').value.trim();
      const results = document.getElementById('results');
      const progressWrap = document.getElementById('progressWrap');
      const btn = document.getElementById('fetchBtn');
      const statusText = document.getElementById('statusText');

      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      if (!lines.length) return;
      if (lines.length > 10) { alert('Max 10 URLs at a time.'); return; }

      const ids = lines.map(l => extractId(l));
      if (ids.some(id => !id)) { alert('One or more URLs are not valid App Store links.'); return; }

      btn.disabled = true;
      statusText.textContent = '';
      results.innerHTML = ids.map(() => skeletonCard()).join('');
      progressWrap.innerHTML = ids.map((_, i) => `
    <div class="progress-item">
      <div class="dot active" id="dot-${i}"></div>
      <span id="lbl-${i}">Waiting...</span>
    </div>`).join('');

      const cards = await Promise.all(ids.map((id, i) => processApp(id, i)));
      const valid = cards.filter(Boolean);
      results.innerHTML = valid.join('');
      statusText.textContent = `Loaded ${valid.length} app${valid.length !== 1 ? 's' : ''}`;
      btn.disabled = false;
    }

    function clearAll() {
      document.getElementById('urls').value = '';
      document.getElementById('results').innerHTML = '';
      document.getElementById('progressWrap').innerHTML = '';
      document.getElementById('statusText').textContent = '';
    }
    function openLightbox(src) {
      document.getElementById('lbImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>

</html>
